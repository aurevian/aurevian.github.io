sections:
  - title: Quantum Computing 
    body: >-
     Quantum computing is at the centre of my current research. I work primarily in Python, using frameworks such as Qiskit and PennyLane. alongside libraries like NumPy, SciPy, scikit-learn, and PyTorch to develop quantum circuits, quantum algorithms, encoding strategies, and mathematically grounded computational models.
    icons:
