      Python is at the core of my day-to-day research and development software language, providing the flexibility I need for rapid prototyping, scientific computing, and model development. 
      When computational efficiency becomes critical and performance-intensive components need to be optimized, I can turn to C++ to build faster and more robust solutions. 
