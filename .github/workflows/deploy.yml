name: Build and Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout personal site
        uses: actions/checkout@v4

      - name: Checkout Jupyter Book content
        uses: actions/checkout@v4
        with:
          repository: aurevian/quantum-opensource-documentation
          path: quantum-opensource-documentation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Jupyter Book / MyST
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-book mystmd

      - name: Build Chapter1 with MyST
        working-directory: quantum-opensource-documentation/Chapter1
        run: |
          myst build --html

      - name: Set up Ruby for Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build -d _site

      - name: Copy Chapter1 into final site
        run: |
          mkdir -p _site/blog/chapter1
          cp -r quantum-opensource-documentation/Chapter1/_build/html/* _site/blog/chapter1/

      - name: Add .nojekyll to published artifact
        run: touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
